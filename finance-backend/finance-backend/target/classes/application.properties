# Server
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/finance_dashboard
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (change this to a strong random string in production)
app.jwt.secret=your_super_secret_jwt_key_change_this_in_production_min_256_bits
app.jwt.expiration=86400000

# CORS (allow frontend)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
